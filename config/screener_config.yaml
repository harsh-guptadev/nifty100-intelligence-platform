# Screener Config YAML
# Defines thresholds for the 6 preset screeners

presets:
  Quality Compounder:
    return_on_equity_pct_min: 15.0
    debt_to_equity_max: 1.0
    free_cash_flow_cr_min: 0.0
    revenue_cagr_5yr_min: 10.0

  Value Pick:
    pe_ratio_max: 30.0
    pb_ratio_max: 4.0
    debt_to_equity_max: 2.0
    dividend_yield_pct_min: 1.0

  Growth Accelerator:
    pat_cagr_5yr_min: 20.0
    revenue_cagr_5yr_min: 15.0
    debt_to_equity_max: 2.0

  Dividend Champion:
    dividend_yield_pct_min: 2.0
    dividend_payout_ratio_pct_max: 80.0
    free_cash_flow_cr_min: 0.0

  Debt-Free Blue Chip:
    debt_to_equity_max: 0.0
    return_on_equity_pct_min: 12.0
    sales_min: 5000.0

  Turnaround Watch:
    revenue_cagr_3yr_min: 10.0
    fcf_positive_latest: true
    de_declining_yoy: true
